name: psyagend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  intl: ^0.20.2
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0
  google_nav_bar: ^5.0.6
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0
  share_plus: ^10.1.0
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  firebase_crashlytics: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icono.png"
  remove_alpha_ios: true
  background_color: "#FFFFFF"
